# Example policy — a generic starting point for an HTTP/JSON API.
#
# Evaluation order: forbidden (hard deny) -> rules (first match wins) -> default.
# A matched rule whose constraints fail becomes a DENY (fail-closed).
#
# `match` supports: method (str or list), host, path (glob), path_contains.
# `params` referenced by constraints are the fields the agent declares on the
# action (e.g. amount, currency, destination).

version: 1
default: deny # anything not explicitly allowed is refused

forbidden:
  - name: no-access-control-changes
    description: Agents may never modify permissions or sharing
    match:
      path_contains: /permissions

  - name: no-deletes
    description: Agents may never delete resources
    match:
      method: POST
      path: /delete

rules:
  - name: read-accounts
    description: Read own account data
    decision: allow
    match:
      method: GET
      host: api.example.com
      path: /accounts/**
    constraints:
      rate_limit: { max: 50, per: hour }

  - name: read-orders
    description: Read own orders (read-only, rate-limited)
    decision: allow
    match:
      method: GET
      host: api.example.com
      path: /orders/**
    constraints:
      rate_limit: { max: 50, per: hour }

  - name: place-order
    description: Place a small order — always needs human approval
    decision: needs_approval
    match:
      method: POST
      host: api.example.com
      path: /orders
    constraints:
      amount: { field: amount, max: 5000, currency: USD }
      allow_list: { field: destination, in: [internal] }
